<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Banners Publicitarios</title>
    <link rel="icon" type="image/png" th:href="@{/assets/favicon_square.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="admin-nav">
        <div>
            <h2 style="margin: 0; display: inline-block;">PALANT S.A.C.</h2>
            <span style="font-size: 12px; margin-left: 10px; color: rgba(255,255,255,0.7);">Panel de Control</span>
        </div>
        <div class="admin-nav-links">
            <a th:href="@{/admin/productos}">Productos</a>
            <a th:href="@{/admin/pedidos}">
                Pagos y Pedidos
                <span th:if="${pendientesCount != null and pendientesCount > 0}" th:text="${pendientesCount}" style="background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 5px;"></span>
            </a>
            <a th:href="@{/admin/banners}" class="active">Banners</a>
            <a th:href="@{/admin/logout}" class="btn" style="color:var(--nav-gradient);">Cerrar Sesión</a>
        </div>
    </div>

    <div class="container" style="max-width: 1000px;">
        <h1>Gestión de Banners Publicitarios</h1>
        <p style="color: #64748b;">Sube imágenes anchas (ej. 1200x300 px) para el carrusel de la página principal.</p>

        <div class="form-section" style="margin-bottom: 30px;">
            <form th:action="@{/admin/banners/guardar}" method="post" enctype="multipart/form-data" style="display:flex; gap:15px; align-items:center;">
                <div style="flex:1;">
                    <label>Seleccionar Imagen del Banner</label>
                    <input type="file" name="archivoBanner" class="form-control" accept="image/*" required>
                </div>
                <div style="padding-top:20px;">
                    <button type="submit" class="btn">Subir Banner</button>
                </div>
            </form>
        </div>

        <div class="list-section">
            <table class="prod-table">
                <thead>
                    <tr>
                        <th style="width:50px;">ID</th>
                        <th>Vista Previa del Banner</th>
                        <th style="width:150px;">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${banners}">
                        <td th:text="${b.idBanner}"></td>
                        <td>
                            <img th:src="${b.imagenBase64}" style="width: 100%; max-width: 500px; height: auto; border-radius: 8px;">
                        </td>
                        <td>
                            <a th:href="@{/admin/banners/eliminar/{id}(id=${b.idBanner})}" class="btn" style="background:#ef4444; color:white;">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
