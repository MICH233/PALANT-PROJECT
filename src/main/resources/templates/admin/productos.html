<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <link rel="icon" type="image/png" th:href="@{/assets/favicon_square.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="admin-nav">
        <div>
            <h2 style="margin: 0; display: inline-block;">PALANT S.A.C.</h2>
            <span style="font-size: 12px; margin-left: 10px; color: var(--text-muted);">Panel de Control</span>
        </div>
        <div class="admin-nav-links">
            <a th:href="@{/admin/productos}" class="active">Productos</a>
            <a th:href="@{/admin/pedidos}">
                Pagos y Pedidos
                <span th:if="${pendientesCount != null and pendientesCount > 0}" th:text="${pendientesCount}" style="background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 5px;"></span>
            </a>
            <a th:href="@{/admin/banners}">Banners</a>
            <a th:href="@{/admin/logout}" class="btn" style="color:var(--card-bg);">Cerrar Sesión</a>
        </div>
    </div>

    <div class="container">
        <div class="content-grid">
            
            <div class="form-section">
                <h3 style="margin-top: 0;" id="formTitle">Registrar Producto</h3>
                <form id="producto-form" th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{idProducto}" id="idProducto">
                    
                    <label>Nombre del Producto</label>
                    <input type="text" th:field="*{nombre}" id="nombre" class="form-control" placeholder="Ej: Polo Deportivo Nike" required>
                    
                    <label>Categoría</label>
                    <select th:field="*{categoria}" id="categoria" class="form-control" required>
                        <option value="DEPORTIVO">Deportivo</option>
                        <option value="CASUAL">Casual</option>
                        <option value="ACCESORIO">Accesorio</option>
                    </select>
                    
                    <label>Descripción</label>
                    <textarea th:field="*{descripcion}" id="descripcion" class="form-control" rows="3" placeholder="Descripción del producto"></textarea>
                    
                    <label>Tallas Disponibles (Separadas por comas, ej: S,M,L,XL)</label>
                    <input type="text" th:field="*{tallasDisponibles}" id="tallasDisponibles" class="form-control" placeholder="Dejar vacío si no aplica">
                    
                    <label>Precio (S/)</label>
                    <input type="number" step="0.01" th:field="*{precio}" id="precio" class="form-control" value="0.00" required>
                    
                    <label>Stock</label>
                    <input type="number" th:field="*{stock}" id="stock" class="form-control" value="0" required>
                    
                    <label>Imagen Principal (Opcional si edita)</label>
                    <input type="file" name="archivoImagen" id="archivoImagen" class="form-control" accept="image/*">
                    <input type="hidden" th:field="*{imagenBase64}">
                    
                    <label>Imágenes Extra (Opcional)</label>
                    <input type="file" name="archivosExtra" id="archivosExtra" class="form-control" accept="image/*" multiple>
                    
                    <button type="submit" class="btn" style="width: 100%;">Guardar Producto</button>
                </form>
            </div>
            
            <div class="list-section">
                <h3 style="margin-top: 0;">Productos Registrados</h3>
                <table class="prod-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${productos}">
                            <td>
                                <img th:if="${p.imagenBase64 != null}" th:src="${p.imagenBase64}" alt="Prod">
                                <span th:if="${p.imagenBase64 == null}">Sin Img</span>
                            </td>
                            <td>
                                <strong th:text="${p.nombre}"></strong><br>
                                <small th:text="${p.descripcion}" style="color: #94a3b8;"></small>
                            </td>
                            <td th:text="${p.categoria}"></td>
                            <td th:text="'S/ ' + ${p.precio}"></td>
                            <td th:text="${p.stock} + ' unidades'"></td>
                            <td>
                                <a href="#" 
                                   th:data-id="${p.idProducto}"
                                   th:data-nombre="${p.nombre}"
                                   th:data-categoria="${p.categoria}"
                                   th:data-descripcion="${p.descripcion}"
                                   th:data-precio="${p.precio}"
                                   th:data-stock="${p.stock}"
                                   th:data-tallas="${p.tallasDisponibles}"
                                   onclick="cargarDatosEdicion(this); return false;" 
                                   style="color: #2563eb; font-size: 13px; font-weight: bold; text-decoration: none; margin-right: 15px;">Editar</a>
                                <a th:href="@{/admin/productos/eliminar/{id}(id=${p.idProducto})}" style="color: #ef4444; font-size: 13px; font-weight: bold; text-decoration: none;" onclick="return confirm('¿Estás seguro de eliminar este producto?');">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </div>
    </div>

    <script>
        function cargarDatosEdicion(btn) {
            document.getElementById('idProducto').value = btn.getAttribute('data-id');
            document.getElementById('nombre').value = btn.getAttribute('data-nombre');
            document.getElementById('categoria').value = btn.getAttribute('data-categoria');
            document.getElementById('descripcion').value = btn.getAttribute('data-descripcion') || '';
            document.getElementById('tallasDisponibles').value = btn.getAttribute('data-tallas') || '';
            document.getElementById('precio').value = btn.getAttribute('data-precio');
            document.getElementById('stock').value = btn.getAttribute('data-stock');
            
            document.getElementById('formTitle').innerText = 'Editar Producto';
            
            let btnCancel = document.getElementById('btnCancelar');
            if(!btnCancel) {
                btnCancel = document.createElement('button');
                btnCancel.id = 'btnCancelar';
                btnCancel.type = 'button';
                btnCancel.innerText = 'Cancelar Edición';
                btnCancel.className = 'btn';
                btnCancel.style.backgroundColor = '#64748b';
                btnCancel.style.marginTop = '10px';
                btnCancel.style.width = '100%';
                btnCancel.onclick = cancelarEdicion;
                document.getElementById('producto-form').appendChild(btnCancel);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function cancelarEdicion() {
            document.getElementById('idProducto').value = '0';
            document.getElementById('producto-form').reset();
            document.getElementById('formTitle').innerText = 'Registrar Producto';
            const btnCancel = document.getElementById('btnCancelar');
            if (btnCancel) btnCancel.remove();
        }
    </script>
</body>
</html>
