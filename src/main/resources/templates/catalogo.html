<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo PALANT S.A.C</title>
    <link rel="icon" type="image/png" th:href="@{/assets/favicon_square.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="top-nav">
        <div style="display: flex; align-items: center;">
            <img th:src="@{/assets/favicon.png}" alt="Logo PALANT" style="height: 40px; margin-right: 15px; object-fit: contain;">
            <a href="#">Catálogo</a>
            <a href="#">Personalizado</a>
        </div>
        <div>
            <a th:href="@{/carrito}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right:4px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Carrito
            </a>
            <a th:if="${session.usuarioLogueado == null}" th:href="@{/login}" class="btn" style="color: var(--nav-gradient); padding: 5px 15px; margin-left:15px;">Iniciar sesión</a>
            <a th:if="${session.usuarioLogueado != null}" th:href="@{/perfil}" style="margin-left:15px; display:inline-flex; align-items:center; gap:5px;">
                <img th:if="${session.usuarioLogueado.fotoPerfil != null}" th:src="${session.usuarioLogueado.fotoPerfil}" style="width:25px; height:25px; border-radius:50%; object-fit:cover;">
                <span th:if="${session.usuarioLogueado.fotoPerfil == null}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span> Perfil
            </a>
            <a th:if="${session.usuarioLogueado != null}" th:href="@{/logout}" class="btn" style="background: #ef4444; color: white; padding: 5px 15px; margin-left:10px;">Salir</a>
        </div>
    </div>

    <div class="container" style="max-width: 1600px; padding: 0 40px;">
        
        <!-- Carrusel de Banners -->
        <div class="hero" style="padding: 0; overflow: hidden; position: relative; height: 300px; display: flex; align-items: center; justify-content: center;">
            
            <div th:if="${banners == null or banners.isEmpty()}" style="padding: 50px 20px;">
                Descubre nuestra colección de indumentaria deportiva y casual
            </div>

            <div th:if="${banners != null and !banners.isEmpty()}" class="carousel" style="width: 100%; height: 100%; position: relative;">
                <div th:each="b, iterStat : ${banners}" class="carousel-slide" th:style="${iterStat.index == 0 ? 'display:block;' : 'display:none;'} + ' width:100%; height:100%;'">
                    <img th:src="${b.imagenBase64}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                </div>
            </div>
            
        </div>
        
        <script>
            let slideIndex = 0;
            const slides = document.querySelectorAll('.carousel-slide');
            if(slides.length > 1) {
                setInterval(() => {
                    slides[slideIndex].style.display = 'none';
                    slideIndex = (slideIndex + 1) % slides.length;
                    slides[slideIndex].style.display = 'block';
                }, 3500); // Cambia cada 3.5 segundos
            }
        </script>
        
        <div th:if="${param.exito}" style="background: var(--accent); color: var(--bg-dark); padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; font-weight: bold;">
            ¡Acción realizada con éxito!
        </div>

        <div class="category-tabs">
            <a href="#" class="tab active">Todos</a>
            <a href="#" class="tab">Deportivo</a>
            <a href="#" class="tab">Casual</a>
            <a href="#" class="tab">Accesorios</a>
        </div>

        <div class="grid" style="margin-top: 30px;">
            <div class="prod-card" th:each="p : ${productos}" style="display: flex; flex-direction: column; height: 100%;">
                <a th:href="@{/producto/{id}(id=${p.idProducto})}" style="display:flex; flex-direction:column; flex-grow: 1; text-decoration:none; color:inherit;">
                    <img th:if="${p.imagenBase64 != null}" th:src="${p.imagenBase64}" class="prod-img" alt="Producto">
                    <div th:if="${p.imagenBase64 == null}" style="width:100%; height:250px; background:#e2e8f0; display:flex; align-items:center; justify-content:center; color:#94a3b8;">Sin Imagen</div>
                    
                    <div class="prod-info" style="flex-grow: 1;">
                        <h3 th:text="${p.nombre}">Nombre</h3>
                        <p th:text="${p.categoria}"></p>
                        <p style="color: #64748b; font-weight: bold;" th:text="'S/ ' + ${p.precio}">0.00</p>
                    </div>
                </a>
                <div style="padding: 0 20px 20px;">
                    <a th:href="@{/producto/{id}(id=${p.idProducto})}" class="add-btn" style="display:block; box-sizing: border-box; width: 100%; text-align:center; text-decoration:none;" th:if="${p.stock > 0}">Ver Detalles</a>
                    <button th:if="${p.stock <= 0}" class="add-btn" style="background: #ccc; cursor: not-allowed; box-sizing: border-box; width: 100%;" disabled>Agotado</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
