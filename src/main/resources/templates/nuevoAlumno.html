<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>listado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
	<div class="container text-center">
		<h2 class="h2">
			Nuevo Alumno
		</h2>
	</div>
	<div class="container">
	<form id="form1" method="post" th:action="@{/guardar}" th:object="${alumno}">
		<div class="row mb-3">
    		<label for="inputEmail3" class="col-sm-2 col-form-label">
    			Nombre:
    		</label>
    		<div class="col-sm-10">
      			<input type="text" th:field="*{nombre}" class="form-control" id="inputEmail3">
    		</div>
  		</div>
  		
  		<div class="row mb-3">
    		<label for="inputApellido" class="col-sm-2 col-form-label">
    			Apellido:
    		</label>
    		<div class="col-sm-10">
      			<input type="text" th:field="*{apellido}" class="form-control" id="inputApellido">
    		</div>
  		</div>
  		
  		<div class="row mb-3">
    		<label for="inputPassword3" class="col-sm-2 col-form-label">
    			Celular:
    		</label>
    		<div class="col-sm-10">
      			<input type="text" th:field="*{celular}" class="form-control" id="inputPassword3">
    		</div>
  		</div>
  		
  		<div class="row mb-3">
    		<label for="inputPassword3" class="col-sm-2 col-form-label">
    			Correo:
    		</label>
    		<div class="col-sm-10">
      			<input type="email" th:field="*{correo}" class="form-control" id="inputPassword3">
    		</div>
  		</div>
		<p>
			<input type="submit" value="Guardar" class="btn-primary">
		</p>
	</form>
	</div>
</div>
</body>
</html>
